<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="DevPT Lab — the full clinical encounter">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCFCFB"/>
      <stop offset="1" stop-color="#F4F6F5"/>
    </linearGradient>
    <style>
      .h  { font-family: 'Hanken Grotesk','Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif; }
      .m  { font-family: 'JetBrains Mono',ui-monospace,'Cascadia Code',Consolas,monospace; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1280" height="800" fill="url(#paper)"/>
  <!-- faint oversized cube, decorative -->
  <g opacity="0.05" transform="translate(905 150) scale(20)">
    <path d="M16 4l11 6v12l-11 6-11-6V10z" fill="#16191D"/>
    <path d="M16 4l11 6-11 6-11-6z" fill="#9aa7b2"/>
    <path d="M27 10v12l-11 6V16z" fill="#c7d0d8"/>
    <path d="M5 10v12l11 6V16z" fill="#77838d"/>
  </g>
  <!-- green signal bar -->
  <rect x="96" y="132" width="44" height="5" rx="2.5" fill="#009A44"/>

  <!-- DevPT cube mark -->
  <g transform="translate(96 176) scale(3.1)">
    <path d="M16 4l11 6v12l-11 6-11-6V10z" fill="#16191D"/>
    <path d="M16 4l11 6-11 6-11-6z" fill="#9aa7b2"/>
    <path d="M27 10v12l-11 6V16z" fill="#c7d0d8"/>
    <path d="M5 10v12l11 6V16z" fill="#77838d"/>
  </g>

  <text class="m" x="240" y="232" font-size="22" letter-spacing="1" fill="#06773A">// the full clinical encounter</text>
  <text class="h" x="238" y="296" font-size="40" font-weight="600" letter-spacing="-1" fill="#16191D">DevPT Lab</text>

  <text class="h" x="96" y="430" font-size="78" font-weight="600" letter-spacing="-2" fill="#16191D">The whole encounter,</text>
  <text class="h" x="96" y="516" font-size="78" font-weight="600" letter-spacing="-2" fill="#16191D">start to finish.</text>

  <text class="h" x="98" y="588" font-size="29" font-weight="500" fill="#77838D">Interview a virtual patient, work the chart, document</text>
  <text class="h" x="98" y="626" font-size="29" font-weight="500" fill="#77838D">the visit, and commit to a plan &#8212; one continuous case.</text>

  <!-- mission-flow pills -->
  <g transform="translate(96 678)">
    <rect x="0" y="0" width="186" height="56" rx="28" fill="#FCFCFB" stroke="#E7EBEC"/>
    <text class="h" x="93" y="36" font-size="24" font-weight="500" fill="#16191D" text-anchor="middle">Interview</text>
    <circle cx="214" cy="28" r="5" fill="#009A44"/>
    <rect x="244" y="0" width="200" height="56" rx="28" fill="#FCFCFB" stroke="#E7EBEC"/>
    <text class="h" x="344" y="36" font-size="24" font-weight="500" fill="#16191D" text-anchor="middle">Document</text>
    <circle cx="476" cy="28" r="5" fill="#009A44"/>
    <rect x="506" y="0" width="164" height="56" rx="28" fill="#FCFCFB" stroke="#E7EBEC"/>
    <text class="h" x="588" y="36" font-size="24" font-weight="500" fill="#16191D" text-anchor="middle">Decide</text>
  </g>

  <text class="m" x="1184" y="742" font-size="20" fill="#9AA7B2" text-anchor="end">lab.devpt.app</text>
</svg>
